# b2metric-aria profile — tuned 2026-06-07 for agentic coding stability.
# Rationale (see session_20260607_112341 post-mortem):
#   - main model -> gemini-reasoner (gemini-3.1-pro): deepseek-pro produced
#     empty/400 responses after tool calls and lost cross-file architectural
#     consistency. claude-sonnet/opus are BROKEN on the live proxy (Anthropic key
#     not injected into the running litellm container -> 401). gemini-reasoner is
#     strong, vision-capable, ~1M ctx, and verified working. Switch to claude-opus
#     once the container is recreated with ANTHROPIC_API_KEY.
#   - context_length 1M -> 400K: deepseek's 1M was a lie and caused silent
#     truncation. gemini-3.1-pro genuinely has ~1M; 400K is an honest, cost-bounded
#     window (compresses at ~300K instead of never).
#   - compression target_ratio 0.2 -> 0.5, threshold 0.85 -> 0.75,
#     protect_last_n 20 -> 40: crushing context to 20% erased architecture
#     decisions mid-session -> drift (the "ayrı repo" mistake).
#   - auxiliary compression model deepseek-v4-flash -> gemini-chat: summary
#     quality = what the agent remembers; flash had only 256K and summarized poorly.
#   - agent.max_turns 90 -> 35: shorter scoped runs; less compounding drift.
#   - mcp_servers trimmed 13 -> 1 (github): 432 tools = ~79K tokens of
#     schema overhead per request. Business MCPs (odoo/slack/stripe/sendgrid/jira/
#     ga4/sentry/search-console/google-workspace/vercel/odoo-business) preserved in
#     config.yaml.bak.aria-tuning-* — copy a block back here to re-enable.
model:
  # Orchestrator = gemini-reasoner (gemini-3.1-pro): genuine ~1M context (fights the
  # plan/decision drift behind "forgets the architecture"), vision-capable (frontend-
  # visual-verification), strong tool-calling, verified working on the proxy. claude-* is
  # BLOCKED ($0 Anthropic credit → loud 400; no longer silently swapped to gemini) — flip
  # default back to claude-sonnet once billing is funded. DeepSeek-R1 is deliberately NOT
  # the orchestrator (weak in agentic tool-loops; ~64K ctx, NOT 1M → silent-truncation
  # trap); R1 serves the reasoning/review roles via the proxy role-*/review-of-* aliases.
  default: gemini-reasoner
  provider: custom
  base_url: http://localhost:4000/v1
  api_key: ${LITELLM_API_KEY}
  context_length: 1000000   # gemini-3.1-pro real ~1M — keep plan + grounding in-context
# Subagent delegation — delegate_task resolves ONE model for ALL children
# (tools/delegate_tool.py:2057 passes creds["model"] to every child; there is
# no per-role hook in the runtime). Route bulk delegated work through the same
# LiteLLM proxy to the cheap-fast role-backend-codegen alias so leaf subagents
# stop burning the orchestrator. Reasoning/review/vision roles (role-architect,
# role-reviewer, review-of-*, role-frontend-vision, role-debugger, role-qa-gate)
# stay at the ORCHESTRATOR level — the parent already routes per-role per
# engineering-core:model-routing + SOUL.md. Do NOT delegate review to a leaf:
# it would inherit this single alias and break reviewer-must-differ-from-author.
delegation:
  base_url: http://localhost:4000/v1
  api_key: ${LITELLM_API_KEY}
  model: role-backend-codegen
  inherit_mcp_toolsets: true
  max_iterations: 50
  max_concurrent_children: 3
agent:
  max_turns: 35
  reasoning_effort: high   # deeper, more careful reasoning (medium -> high)
# Frontend work needs EYES: the agent must render localhost:3000 and screenshot it,
# otherwise it edits the chart UI blind and thrashes (page.tsx rewritten 35x).
# allow_private_urls lets browser_navigate reach localhost; gemini-reasoner is vision-capable.
browser:
  engine: auto
  allow_private_urls: true
  auto_local_for_private_urls: true
  inactivity_timeout: 120
  command_timeout: 30
custom_providers:
- name: litellm
  base_url: http://localhost:4000/v1
  api_key: ${LITELLM_API_KEY}
  models:
  - deepseek-pro
  - deepseek-chat
  - deepseek-reasoner
  - deepseek-v4-pro
  - deepseek-v4-flash
  - claude-haiku
  - claude-sonnet
  - claude-opus
  - gemini-chat
  - gemini-reasoner
  - glm-4
compression:
  enabled: true
  threshold: 0.8          # compress later (gemini ~1M window) — keep more context live
  target_ratio: 0.5
  protect_last_n: 60      # keep more recent turns uncompressed (less mid-task forgetting)
  hygiene_hard_message_limit: 400
  protect_first_n: 5      # protect the opening plan + AGENTS/LOCKED grounding from compression
auxiliary:
  compression:
    provider: custom
    model: gemini-chat
    base_url: http://localhost:4000/v1
    api_key: ${LITELLM_API_KEY}
    timeout: 120
    extra_body: {}
    context_length: 1000000
mcp_servers:
  github:
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-github'
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
onboarding:
  seen:
    openclaw_residue_cleanup: true
    tool_progress_prompt: true
    busy_input_prompt: true
