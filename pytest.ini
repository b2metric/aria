[pytest]
# Both suites are collected: repo-root `tests/` (integration + API/service unit
# tests) and `backend/tests/` (mocked unit tests: auth/audit/query/schema cache).
testpaths = tests backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: marks tests as integration tests (require running services)
    slow: marks tests as slow running
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
