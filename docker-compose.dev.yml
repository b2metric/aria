version: "3.9"

# In-cluster LLM stack (LiteLLM + Langfuse), copied from hermes-llm-infra and run
# as part of THIS project on aria-net. Backend reaches the proxy at http://litellm:4000.
include:
  - path: infra/llm/docker-compose.llm.yml
    env_file: infra/llm/.env

# ─── ARIA Development Environment ───────────────────────────────────────
# Services: PostgreSQL, Redis, Keycloak, MinIO, Qdrant, Prefect
# Usage:    docker compose -f docker-compose.dev.yml up -d

services:
  # ── PostgreSQL (primary app DB) ──────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: aria-postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria_dev
      POSTGRES_DB: aria
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

  # ── Redis (cache / session store) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aria-redis
    ports:
      - "6380:6379"  # Use 6380 to avoid conflict with hermes redis on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aria-net
  # ── Traefik Proxy ──────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: aria-traefik
    command:
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "8081:8080" # Dashboard
    volumes:
      - ./infra/traefik-dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    networks:
      aria-net:
        # In-cluster aliases so containers resolve the SAME external hostnames as
        # the browser (-> consistent OIDC issuer). All three resolve to Traefik.
        aliases:
          - aria.localhost
          - api.aria.localhost
          - auth.aria.localhost

  # ── Keycloak (SSO & IAM) ───────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: aria-keycloak
    command: start-dev --http-port 8080 --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev
      # KC26 hostname v2: full external origin behind Traefik (http, port 80).
      # Issuer becomes http://auth.aria.localhost/auth/realms/aria for every caller.
      KC_HOSTNAME: "http://auth.aria.localhost/auth"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_PROXY_HEADERS: "xforwarded"
    volumes:
      - ./infra/keycloak/aria-realm.json:/opt/keycloak/data/import/aria-realm.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      # KC_HTTP_RELATIVE_PATH=/auth moves the mgmt health endpoint under /auth too.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost:9000\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - aria-net

  keycloak-db:
    image: postgres:16-alpine
    container_name: aria-keycloak-db
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_dev
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

  # ── Backend (FastAPI - Live Reload) ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aria-backend
    command: "uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app/backend
      # Schema vault (docs/vaults/<workspace>/tables/*.md) drives SQL generation;
      # not COPYed in the image, so mount it for dev (else queries → no_tables_found).
      - ./docs:/app/docs
    environment:
      - DATABASE_URL=postgresql+asyncpg://aria:aria_dev@postgres:5432/aria
      - REDIS_URL=redis://redis:6379/0
      # Resolve auth.aria.localhost via Traefik alias so the JWKS host + token `iss`
      # match (no split-horizon issuer mismatch).
      - KEYCLOAK_URL=http://auth.aria.localhost/auth
      # mem0 writes a telemetry/user-id file under ~/.mem0; container user `aria`
      # has no writable HOME, so point it at /tmp and disable telemetry.
      - MEM0_DIR=/tmp/.mem0
      - MEM0_TELEMETRY=False
      # In-cluster Qdrant host (config default localhost:6333 is the backend itself).
      - QDRANT_URL=http://qdrant:6333
      # In-cluster MinIO host. Inside the container `localhost:9000` is the backend
      # itself, so chart-artifact uploads were ConnectionRefused; point at the
      # `minio` service. Overrides the localhost:9000 value in backend/.env.
      - MINIO_ENDPOINT=minio:9000
      # LiteLLM proxy now runs in-cluster (infra/llm, service `litellm`) on aria-net.
      # Overrides the localhost:4000 value in backend/.env (env vars > .env file).
      - LITELLM_API_BASE=http://litellm:4000
      # Optional (item 27, BYOK Phase 2): the LiteLLM proxy master key. When set,
      # customer LLM-config saves mint a per-customer virtual key; unset → Phase-1
      # passthrough. Must match the proxy's LITELLM_MASTER_KEY.
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      # Wait for Keycloak's healthcheck (mgmt /auth/health/ready) before the backend
      # boots, so the JWKS startup gate doesn't race a still-booting Keycloak and exit
      # (that race left api.aria.localhost 502 -> surfaced in the browser as "CORS").
      # The backend ALSO retries JWKS with backoff for residual Traefik routing lag.
      keycloak:
        condition: service_healthy
    networks:
      - aria-net

  # ── Frontend (Next.js - Hot Reload) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aria-frontend
    # Bind 0.0.0.0 so Traefik (other container) can reach Next dev — default
    # localhost-only bind was the 502 root cause.
    command: "npm run dev -- -H 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://api.aria.localhost
      - NEXTAUTH_URL=http://aria.localhost
      # REQUIRED by NextAuth — without it sessions use an unstable auto-generated dev
      # secret (resets every restart; breaks in prod). Override via .env in real envs.
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-aria-dev-nextauth-secret-change-me}
      # Server-side next-auth issuer MUST equal the browser issuer and include /auth.
      - KEYCLOAK_ISSUER=http://auth.aria.localhost/auth/realms/aria
      - NEXT_PUBLIC_KEYCLOAK_ISSUER=http://auth.aria.localhost/auth/realms/aria
    networks:
      - aria-net

  # ── Oracle Database (STC MOCK) ───────────────────────────────────────
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: aria-oracle
    environment:
      ORACLE_PASSWORD: stc123
      APP_USER: stc
      APP_USER_PASSWORD: stc123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - aria-net

  # ── MinIO (S3-compatible object storage) ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: aria-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - aria-net

  # ── Qdrant (vector database) ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aria-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - aria-net

  # ── Prefect (workflow orchestration) ─────────────────────────────────
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: aria-prefect-server
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_SERVER_API_PORT: "4200"
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:prefect_dev@prefect-db:5432/prefect"
    ports:
      - "4200:4200"
    depends_on:
      prefect-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

  prefect-db:
    image: postgres:16-alpine
    container_name: aria-prefect-db
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect_dev
      POSTGRES_DB: prefect
    volumes:
      - prefect_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

# ── Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  oracle_data:
  redis_data:
  keycloak_db_data:
  minio_data:
  qdrant_data:
  prefect_db_data:

# ── Network ────────────────────────────────────────────────────────────
networks:
  aria-net:
    name: aria-net
    driver: bridge
