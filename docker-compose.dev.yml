version: "3.9"

# In-cluster LLM stack (LiteLLM + Langfuse), copied from hermes-llm-infra and run
# as part of THIS project on aria-net. Backend reaches the proxy at http://litellm:4000.
include:
  - path: infra/llm/docker-compose.llm.yml
    env_file: infra/llm/.env

# ─── ARIA Development Environment ───────────────────────────────────────
# Services: PostgreSQL, Redis, Keycloak, MinIO, Qdrant, Prefect
# Usage:    docker compose -f docker-compose.dev.yml up -d

services:
  # ── PostgreSQL (primary app DB) ──────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: aria-postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria_dev
      POSTGRES_DB: aria
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

  # ── Redis (cache / session store) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aria-redis
    ports:
      - "6380:6379"  # Use 6380 to avoid conflict with hermes redis on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aria-net
  # ── Traefik Proxy ──────────────────────────────────────────────────────
  # ── Traefik + Keycloak (REMOVED — migrated to the shared portfolio infra) ──
  # aria now uses the ONE shared Traefik ingress + the central b2metric-sso
  # Keycloak (realm `b2metric`), both on the external `b2metric-net`:
  #   • Ingress: orchestration/docker-compose.shared.yml in the b2metric-cockpit repo
  #     (Traefik v3.7, docker provider, :80). aria's backend/frontend below carry
  #     `traefik.*` labels + join b2metric-net so the shared Traefik routes them.
  #   • IdP: docker compose -f ~/projects/b2metric-sso/docker-compose.yml up -d
  #     (issuer http://sso.b2metric.localhost/auth/realms/b2metric; aria-web/
  #     aria-backend/aria-cli clients already exist in the shared realm).
  # aria's own `traefik`, `keycloak`, `keycloak-db` services were removed; the
  # `infra/traefik-dynamic.yml` file-provider config is no longer used.

  # ── Backend (FastAPI - Live Reload) ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aria-backend
    command: "uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app/backend
      # Schema vault (docs/vaults/<workspace>/tables/*.md) drives SQL generation;
      # not COPYed in the image, so mount it for dev (else queries → no_tables_found).
      - ./docs:/app/docs
    environment:
      - DATABASE_URL=postgresql+asyncpg://aria:aria_dev@postgres:5432/aria
      - REDIS_URL=redis://redis:6379/0
      # Central SSO (b2metric-sso, shared realm `b2metric`). The shared Traefik's
      # network alias for sso.b2metric.localhost resolves this in-cluster so the
      # JWKS host + token `iss` match for browser AND server-side callers.
      - KEYCLOAK_URL=http://sso.b2metric.localhost/auth
      - KEYCLOAK_REALM=b2metric
      # mem0 writes a telemetry/user-id file under ~/.mem0; container user `aria`
      # has no writable HOME, so point it at /tmp and disable telemetry.
      - MEM0_DIR=/tmp/.mem0
      - MEM0_TELEMETRY=False
      # In-cluster Qdrant host (config default localhost:6333 is the backend itself).
      - QDRANT_URL=http://qdrant:6333
      # LiteLLM proxy now runs in-cluster (infra/llm, service `litellm`) on aria-net.
      # Overrides the localhost:4000 value in backend/.env (env vars > .env file).
      - LITELLM_API_BASE=http://litellm:4000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    # The central SSO is a SEPARATE stack (b2metric-sso); the backend retries JWKS
    # with backoff at startup, so no cross-stack depends_on is needed.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=b2metric-net"
      - "traefik.http.routers.aria-api.rule=Host(`api.aria.localhost`)"
      - "traefik.http.routers.aria-api.entrypoints=web"
      - "traefik.http.services.aria-api.loadbalancer.server.port=8000"
    networks:
      - aria-net        # app-internal services (postgres/redis/qdrant/litellm)
      - b2metric-net    # shared ingress + central SSO

  # ── Frontend (Next.js - Hot Reload) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aria-frontend
    # Bind 0.0.0.0 so Traefik (other container) can reach Next dev — default
    # localhost-only bind was the 502 root cause.
    command: "npm run dev -- -H 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://api.aria.localhost
      - NEXTAUTH_URL=http://aria.localhost
      # REQUIRED by NextAuth — without it sessions use an unstable auto-generated dev
      # secret (resets every restart; breaks in prod). Override via .env in real envs.
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-aria-dev-nextauth-secret-change-me}
      # Central SSO issuer (shared realm `b2metric`). MUST equal the browser issuer
      # and include /auth. Dev mode (`npm run dev`) reads NEXT_PUBLIC_* at runtime,
      # so no build-arg is needed (unlike a production `next start`).
      - KEYCLOAK_ISSUER=http://sso.b2metric.localhost/auth/realms/b2metric
      - NEXT_PUBLIC_KEYCLOAK_ISSUER=http://sso.b2metric.localhost/auth/realms/b2metric
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=b2metric-net"
      - "traefik.http.routers.aria-web.rule=Host(`aria.localhost`)"
      - "traefik.http.routers.aria-web.entrypoints=web"
      - "traefik.http.services.aria-web.loadbalancer.server.port=3000"
    networks:
      - b2metric-net    # shared ingress + central SSO (FE talks to BE via Traefik)

  # ── Oracle Database (STC MOCK) ───────────────────────────────────────
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: aria-oracle
    environment:
      ORACLE_PASSWORD: stc123
      APP_USER: stc
      APP_USER_PASSWORD: stc123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - aria-net

  # ── MinIO (S3-compatible object storage) ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: aria-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - aria-net

  # ── Qdrant (vector database) ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aria-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - aria-net

  # ── Prefect (workflow orchestration) ─────────────────────────────────
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: aria-prefect-server
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_SERVER_API_PORT: "4200"
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:prefect_dev@prefect-db:5432/prefect"
    ports:
      - "4200:4200"
    depends_on:
      prefect-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

  prefect-db:
    image: postgres:16-alpine
    container_name: aria-prefect-db
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect_dev
      POSTGRES_DB: prefect
    volumes:
      - prefect_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aria-net

# ── Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  oracle_data:
  redis_data:
  minio_data:
  qdrant_data:
  prefect_db_data:

# ── Networks ───────────────────────────────────────────────────────────
networks:
  # App-internal services (postgres/redis/oracle/minio/qdrant/prefect/litellm).
  aria-net:
    name: aria-net
    driver: bridge
  # Shared portfolio bridge — the ONE Traefik ingress + central b2metric-sso live
  # here (created by orchestration/docker-compose.shared.yml in b2metric-cockpit).
  # backend + frontend join it; create once: `docker network create b2metric-net`.
  b2metric-net:
    external: true
    name: b2metric-net
